<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'URL Média - Leroy Merlin / Adeo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .input-field {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s;
            background-color: white;
        }
        .input-field:focus {
            border-color: #009245;
            box-shadow: 0 0 0 3px rgba(0, 146, 69, 0.1);
        }
        .btn-danger {
            color: #ef4444;
            transition: color 0.2s;
        }
        .btn-danger:hover {
            color: #dc2626;
        }
        .url-display {
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .hint-text {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.25rem;
            line-height: 1.2;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-[#009245] rounded-lg flex items-center justify-center text-white font-bold text-xl">LM</div>
                <h1 class="text-3xl font-bold">Générateur d'URL Média</h1>
            </div>
            <p class="text-slate-500">Outil de configuration d'URL Leroy Merlin avec paramètres Fastly IO.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Configuration Section -->
            <section class="card p-6 lg:col-span-1 h-fit">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 border-b pb-2">
                    Structure URL
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Domaine</label>
                        <input type="text" id="domain" class="input-field" value="media.adeo.com">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Source Média</label>
                        <select id="mediaSource" class="input-field cursor-pointer">
                            <option value="media">media (Défaut)</option>
                            <option value="mkp">mkp</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">ID Média</label>
                        <input type="text" id="mediaId" class="input-field" placeholder="ex: 12345678">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Nom du média (libre)</label>
                        <input type="text" id="mediaName" class="input-field" placeholder="ex: perceuse-sans-fil">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Extension</label>
                        <input type="text" id="extension" class="input-field" value="jpg">
                    </div>
                </div>
            </section>

            <!-- Query Parameters Section -->
            <section class="card p-6 lg:col-span-2 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        Paramètres Fastly IO
                    </h2>
                    <button id="addParam" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-[#009245] text-white rounded-md text-sm font-medium hover:bg-[#007a3a] transition-colors">
                        Ajouter
                    </button>
                </div>

                <div id="paramsList" class="space-y-4 flex-grow overflow-y-auto min-h-[300px] pr-2 py-2">
                </div>
                
                <div id="noParamsMsg" class="flex-grow flex items-center justify-center py-12 text-slate-400 italic text-sm">
                    Aucun paramètre configuré.
                </div>
            </section>
        </div>

        <!-- Result Section -->
        <section class="mt-8 card p-6 border-2 border-green-100 bg-green-50/20 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-slate-800">URL Générée</h2>
                <div id="copyToast" class="hidden text-xs font-semibold text-green-600 bg-green-100 px-2 py-1 rounded">Copié !</div>
            </div>
            
            <div class="relative group">
                <div class="bg-white border border-slate-200 p-5 rounded-lg pr-24 transition-all hover:border-green-400 group shadow-sm">
                    <a id="resultUrl" href="#" target="_blank" class="url-display text-blue-600 hover:underline text-sm sm:text-base font-medium break-all leading-relaxed">
                        Chargement...
                    </a>
                </div>
                
                <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1">
                    <button id="copyBtn" class="p-2 text-slate-400 hover:text-green-600 hover:bg-green-50 rounded-md transition-all" title="Copier l'URL">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <a id="openLink" href="#" target="_blank" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-all" title="Ouvrir">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <script>
        const FASTLY_PARAMS = [
            { key: 'format', label: 'Format de sortie', hint: 'Valeurs : webp, pjpg, png, gif, bjpg.' },
            { key: 'width', label: 'Largeur (w)', hint: 'Pixels (ex: 800) ou ratio (ex: 0.5).' },
            { key: 'height', label: 'Hauteur (h)', hint: 'Pixels (ex: 600) ou ratio (ex: 0.5).' },
            { key: 'auto', label: 'Optimisation auto', hint: 'Valeur : webp (sélection auto du format).' },
            { key: 'quality', label: 'Qualité', hint: 'Nombre de 1 à 100. Défaut recommandé : 85.' },
            { key: 'fit', label: 'Ajustement', hint: 'Valeurs : bounds, cover, crop.' },
            { key: 'crop', label: 'Rognage', hint: 'Ex: 200,200 ou "smart" (centrage intelligent).' },
            { key: 'optimize', label: 'Compression', hint: 'Valeurs : low, medium, high.' },
            { key: 'blur', label: 'Flou', hint: 'Nombre de 1 à 1000.' },
            { key: 'brightness', label: 'Luminosité', hint: 'Valeur de -100 à 100.' },
            { key: 'contrast', label: 'Contraste', hint: 'Valeur de -100 à 100.' },
            { key: 'orient', label: 'Orientation', hint: 'Valeurs : r, l, h, v (rotations/miroirs).' },
            { key: 'bg-color', label: 'Fond', hint: 'Hex sans # (ex: ffffff).' },
            { key: 'dpr', label: 'DPR', hint: 'Multiplicateur Retina (ex: 2).' },
            { key: 'sharpen', label: 'Netteté', hint: 'Format : [amount],[radius],[threshold].' }
        ];

        const domainInput = document.getElementById('domain');
        const sourceSelect = document.getElementById('mediaSource');
        const idInput = document.getElementById('mediaId');
        const nameInput = document.getElementById('mediaName');
        const extInput = document.getElementById('extension');
        const paramsList = document.getElementById('paramsList');
        const addParamBtn = document.getElementById('addParam');
        const resultUrl = document.getElementById('resultUrl');
        const openLink = document.getElementById('openLink');
        const noParamsMsg = document.getElementById('noParamsMsg');
        const copyBtn = document.getElementById('copyBtn');
        const copyToast = document.getElementById('copyToast');

        let paramsState = [];

        function updateUrl() {
            const domain = domainInput.value.trim() || '[domain]';
            const source = sourceSelect.value;
            const mediaId = idInput.value.trim() || '[id]';
            const mediaName = nameInput.value.trim() || '[name]';
            const extension = extInput.value.trim() || '[ext]';

            let url = `https://${domain}/${source}/${mediaId}/${mediaName}.${extension}`;

            const validParams = paramsState.filter(p => p.key.trim() !== "" || (p.key === 'custom' && p.manualKey.trim() !== ""));
            if (validParams.length > 0) {
                const queryString = validParams
                    .map(p => {
                        const k = p.key === 'custom' ? p.manualKey : p.key;
                        return `${encodeURIComponent(k)}=${encodeURIComponent(p.value)}`;
                    })
                    .join('&');
                url += `?${queryString}`;
            }

            resultUrl.textContent = url;
            resultUrl.href = url;
            openLink.href = url;
        }

        function createParamRow(paramObj) {
            const row = document.createElement('div');
            row.className = 'p-3 bg-slate-50 border border-slate-100 rounded-lg shadow-sm';
            
            let optionsHtml = FASTLY_PARAMS.map(p => `<option value="${p.key}">${p.key} (${p.label})</option>`).join('');
            
            row.innerHTML = `
                <div class="flex flex-col sm:flex-row gap-2 mb-1">
                    <div class="flex-1">
                        <select class="input-field text-sm key-select h-full">
                            <option value="">Clé...</option>
                            ${optionsHtml}
                            <option value="custom">-- Autre clé --</option>
                        </select>
                    </div>
                    <div class="flex-1 flex gap-2">
                        <div class="flex-1">
                            <input type="text" placeholder="Valeur" class="input-field text-sm val-input h-full" value="${paramObj.value}">
                        </div>
                        <button class="btn-danger p-2 hover:bg-red-50 rounded-md transition-colors delete-param shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <div class="flex flex-col gap-1 pl-1">
                    <input type="text" placeholder="Nom de clé personnalisé" class="input-field text-xs manual-key hidden mt-1">
                    <div class="hint-text italic"></div>
                </div>
            `;

            const keySelect = row.querySelector('.key-select');
            const manualKey = row.querySelector('.manual-key');
            const valInput = row.querySelector('.val-input');
            const deleteBtn = row.querySelector('.delete-param');
            const hintDiv = row.querySelector('.hint-text');

            const updateHint = (key) => {
                const paramDoc = FASTLY_PARAMS.find(p => p.key === key);
                if (paramDoc) {
                    hintDiv.innerHTML = `<span class="font-semibold text-slate-600">${paramDoc.label} :</span> ${paramDoc.hint}`;
                } else if (key === 'custom') {
                    hintDiv.textContent = "Clé personnalisée alphanumérique.";
                } else {
                    hintDiv.textContent = "";
                }
            };

            keySelect.addEventListener('change', (e) => {
                paramObj.key = e.target.value;
                if (e.target.value === 'custom') {
                    manualKey.classList.remove('hidden');
                } else {
                    manualKey.classList.add('hidden');
                    paramObj.manualKey = '';
                }
                updateHint(e.target.value);
                updateUrl();
            });

            manualKey.addEventListener('input', (e) => {
                paramObj.manualKey = e.target.value.replace(/[^a-zA-Z0-9_-]/g, '');
                e.target.value = paramObj.manualKey;
                updateUrl();
            });

            valInput.addEventListener('input', (e) => {
                paramObj.value = e.target.value;
                updateUrl();
            });

            deleteBtn.addEventListener('click', () => {
                paramsState = paramsState.filter(p => p.id !== paramObj.id);
                row.remove();
                checkParamsEmpty();
                updateUrl();
            });

            return row;
        }

        function checkParamsEmpty() {
            if (paramsState.length === 0) {
                noParamsMsg.classList.remove('hidden');
            } else {
                noParamsMsg.classList.add('hidden');
            }
        }

        addParamBtn.addEventListener('click', () => {
            const newParam = { id: Date.now(), key: '', manualKey: '', value: '' };
            paramsState.push(newParam);
            paramsList.appendChild(createParamRow(newParam));
            checkParamsEmpty();
            updateUrl();
        });

        [domainInput, sourceSelect, idInput, nameInput, extInput].forEach(el => {
            el.addEventListener('input', updateUrl);
        });

        copyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const text = resultUrl.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyToast.classList.remove('hidden');
                setTimeout(() => copyToast.classList.add('hidden'), 2000);
            });
        });

        updateUrl();
    </script>
</body>
</html>
